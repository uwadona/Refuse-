function savePost(content, fileUrl, fileType){  alert("Name: " + currentUser.name);
  db.collection("posts").add({  
    uid: currentUser.uid,  
    author: currentUser.name || currentUser.email || "Anonymous", // this prevents undefined
    content: content,  
    fileUrl: fileUrl || "",  
    fileType: fileType || "",
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  })
  .then(function(){  
    document.getElementById("postContent").value = "";  
    document.getElementById("fileInput").value = "";  
    document.getElementById("postBtn").innerText = "POST";  
    document.getElementById("postBtn").disabled = false;  
    alert("Posted!");
  })
  .catch(function(error){
    console.error(error);
    alert("Save failed: " + error.message);
    document.getElementById("postBtn").innerText = "POST";  
    document.getElementById("postBtn").disabled = false;  
  });
}// POST WITH PHOTO/VIDEO
document.getElementById("postBtn").onclick = function() {
  
  var content = document.getElementById("postContent").value;
  var file = document.getElementById("fileInput").files[0];
  
  if (content == "" && !file) {
    return alert("Write something or add photo/video");
  }
  
  document.getElementById("postBtn").innerText = "UPLOADING...";
  document.getElementById("postBtn").disabled = true;
  
  if (file) {
    
    var formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "Rwaconnect");
    
    fetch("https://api.cloudinary.com/v1_1/gn26tcrh/auto/upload", {
        method: "POST",
        body: formData
      })
      .then(function(response) {
        return response.json();
      })
      .then(function(data) {
        
        savePost(content, data.secure_url, file.type);
        
      })
      .catch(function(error) {
        
        alert(error.message);
        document.getElementById("postBtn").innerText = "POST";
        document.getElementById("postBtn").disabled = false;
        
      });
    
  } else {
    
    savePost(content, "", "");
    
  }
  
};

    })

  }

function addNotification(toUser, message, fromUser){

  db.collection("notifications").add({
   user: toUser,
    message: message,
    from: fromUser,
    type: "follow",
    time: Date.now()
  })
  .then(function(){
    alert("Notification saved");
  })
  .catch(function(error){
    alert("Notification error: " + error.message);
  });

}
 function loadNotifications() {

  db.collection("notifications")
  .where("user", "==", currentUser.uid)

list.innerHTML +=
